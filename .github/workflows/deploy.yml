name: Deploy Portfolio Site to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@v4

      - name: Setup Web Pages Infrastructure
        uses: actions/configure-pages@v4

      - name: Package Dynamic Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Distribute Build Payload to Live Servers
        id: deployment
        uses: actions/deploy-pages@v4
